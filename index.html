<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>50/50: Experiencia Total</title>
    <style>
        :root { --bg: rgba(15, 23, 42, 0.9); --card: rgba(30, 41, 59, 0.95); --accent: #38bdf8; --correct: #22c55e; --text: #f8fafc; }
        
        body { 
            font-family: 'Inter', sans-serif; 
            display: flex; justify-content: center; align-items: center; 
            min-height: 100vh; margin: 0; 
            background-color: #0f172a;
            background-size: cover; background-position: center;
            transition: background-image 1s ease-in-out;
        }

        #game-container { 
            background: var(--card); padding: 2.5rem; border-radius: 24px; 
            width: 95%; max-width: 600px; border: 1px solid #334155; 
            text-align: center; backdrop-filter: blur(10px);
        }

        .controls { display: flex; justify-content: space-between; margin-bottom: 30px; gap: 10px; }
        select { background: #334155; color: white; border: 1px solid #475569; padding: 8px; border-radius: 8px; font-size: 0.8rem; }
        
        .category-tag { text-transform: uppercase; font-size: 0.7rem; letter-spacing: 2px; color: var(--accent); margin-bottom: 10px; font-weight: 800; text-shadow: 0 0 10px rgba(56, 189, 248, 0.5); }
        .question { font-size: 1.7rem; margin-bottom: 1.5rem; font-weight: 700; line-height: 1.3; color: #fff; }
        
        .options-text-container { font-size: 1.3rem; margin-bottom: 2rem; display: flex; flex-direction: column; gap: 10px; font-weight: 500; }
        .opt-text { transition: all 0.3s ease; padding: 5px; border-radius: 8px; color: #94a3b8; }
        .highlight-correct { color: var(--correct) !important; font-weight: 800; transform: scale(1.1); }
        .dim-wrong { opacity: 0.2; filter: blur(1px); }

        #explanation-card { background: rgba(15, 23, 42, 0.8); padding: 0; max-height: 0; overflow: hidden; border-radius: 12px; margin-bottom: 20px; transition: all 0.5s ease; opacity: 0; text-align: left; }
        #explanation-card.show { padding: 20px; max-height: 400px; opacity: 1; border: 1px solid #334155; }
        .expl-title { color: var(--accent); font-size: 0.8rem; font-weight: 800; margin-bottom: 8px; display: block; }
        
        .action-btn { background: var(--accent); color: #0f172a; padding: 18px; border: none; border-radius: 14px; width: 100%; cursor: pointer; font-weight: 800; font-size: 1.1rem; transition: 0.3s; box-shadow: 0 4px 15px rgba(56, 189, 248, 0.3); }
        .action-btn:hover { filter: brightness(1.1); transform: translateY(-2px); }
    </style>
</head>
<body>

<div id="game-container">
    <div class="controls">
        <select id="catFilter" onchange="resetAndLoad()"><option value="Todas">Temas: Todos</option></select>
        <select id="diffFilter" onchange="resetAndLoad()">
            <option value="Todas">Nivel: Todos</option>
            <option value="Fácil">Fácil</option>
            <option value="Media">Media</option>
            <option value="Difícil">Difícil</option>
        </select>
    </div>
    
    <div id="catTag" class="category-tag">CATEGORÍA</div>
    <div id="q" class="question">Cargando...</div>
    
    <div class="options-text-container">
        <div id="textA" class="opt-text">A) Opción A</div>
        <div id="textB" class="opt-text">B) Opción B</div>
    </div>

    <div id="explanation-card">
        <span class="expl-title">LA EXPLICACIÓN:</span>
        <span id="expl-text"></span>
    </div>
    
    <button id="mainBtn" class="action-btn" onclick="handleAction()">REVELAR RESPUESTA</button>
</div>

<audio id="dingSound" src="https://assets.mixkit.co"></audio>

<script>
    let questions = [];
    let currentQ;
    let showingResult = false;
    const ding = document.getElementById('dingSound');

    // Parse CSV and convert to questions array
    function parseCSV(csvText) {
        const lines = csvText.trim().split('\n');
        const parsedQuestions = [];
        
        for (let i = 1; i < lines.length; i++) {
            const line = lines[i].trim();
            if (!line) continue;
            
            // Parse CSV with proper handling of quoted fields
            const fields = [];
            let current = '';
            let inQuotes = false;
            
            for (let j = 0; j < line.length; j++) {
                const char = line[j];
                if (char === '"') {
                    inQuotes = !inQuotes;
                } else if (char === ',' && !inQuotes) {
                    fields.push(current.trim());
                    current = '';
                } else {
                    current += char;
                }
            }
            fields.push(current.trim());
            
            if (fields.length >= 8) {
                parsedQuestions.push({
                    id: fields[0],
                    c: fields[1],   // Categoría
                    q: fields[2],   // Pregunta
                    a: fields[3],   // Opción A
                    b: fields[4],   // Opción B
                    r: fields[5],   // Correcta
                    d: fields[6],   // Dificultad
                    e: fields[7]    // Explicación
                });
            }
        }
        return parsedQuestions;
    }

    async function loadQuestionsFromCSV() {
        try {
            const response = await fetch('preguntas.csv');
            if (!response.ok) throw new Error('Failed to load CSV');
            const csvText = await response.text();
            questions = parseCSV(csvText);
            
            if (questions.length === 0) {
                document.getElementById('q').innerText = 'No se encontraron preguntas.';
                return;
            }
            
            setupCategories();
            loadQuestion();
        } catch (error) {
            console.error('Error:', error);
            document.getElementById('q').innerText = 'Error al cargar preguntas.csv';
        }
    }

    function setupCategories() {
        const catSelect = document.getElementById('catFilter');
        const uniqueCategories = [...new Set(questions.map(q => q.c))].sort();
        uniqueCategories.forEach(cat => {
            const opt = document.createElement('option');
            opt.value = cat;
            opt.innerText = cat;
            catSelect.appendChild(opt);
        });
    }

    function changeBackground(topic) {
        const imageUrl = `https://source.unsplash.com/1600x900/?${topic.toLowerCase()},wallpaper`;
        document.body.style.backgroundImage = `linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('${imageUrl}')`;
    }

    function resetAndLoad() { loadQuestion(); }

    function loadQuestion() {
        const diff = document.getElementById('diffFilter').value;
        const cat = document.getElementById('catFilter').value;
        let pool = questions.filter(q => (diff === "Todas" || q.d === diff) && (cat === "Todas" || q.c === cat));

        if (pool.length === 0) {
            document.getElementById('q').innerText = "Sin preguntas con este filtro.";
            return;
        }

        currentQ = pool[Math.floor(Math.random() * pool.length)];
        changeBackground(currentQ.c);

        document.getElementById('catTag').innerText = `${currentQ.c} | ${currentQ.d}`;
        document.getElementById('q').innerText = currentQ.q;
        document.getElementById('textA').innerText = "A) " + currentQ.a;
        document.getElementById('textB').innerText = "B) " + currentQ.b;
        
        document.getElementById('textA').className = "opt-text";
        document.getElementById('textB').className = "opt-text";
        document.getElementById('explanation-card').classList.remove('show');
        document.getElementById('mainBtn').innerText = "REVELAR RESPUESTA";
        document.getElementById('mainBtn').style.background = "var(--accent)";
        showingResult = false;
    }

    function handleAction() {
        if (!showingResult) {
            ding.currentTime = 0;
            ding.play();

            const correctID = "text" + currentQ.r;
            const wrongID = currentQ.r === 'A' ? 'textB' : 'textA';
            
            document.getElementById(correctID).classList.add('highlight-correct');
            document.getElementById(wrongID).classList.add('dim-wrong');
            document.getElementById('expl-text').innerText = currentQ.e;
            document.getElementById('explanation-card').classList.add('show');
            
            document.getElementById('mainBtn').innerText = "SIGUIENTE PREGUNTA";
            document.getElementById('mainBtn').style.background = "#475569";
            showingResult = true;
        } else {
            loadQuestion();
        }
    }

    loadQuestionsFromCSV();
</script>
</body>
</html>
